name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, type check, and test
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:all

  check-release-version:
    name: Check release version is not already published
    if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/dev')
    runs-on: windows-latest
    needs: quality
    permissions:
      contents: read
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Fail if this version's Stable tag already exists
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.get-version.outputs.version }}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release $tag already exists. Bump the version in package.json before pushing to ${{ github.event.repository.default_branch }}."
            exit 1
          fi

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    needs: check-release-version
    if: github.event_name == 'push' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.ref == 'refs/heads/dev')
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win

      - name: Publish Stable Release
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.check-release-version.outputs.version }}
          commit: ${{ github.sha }}
          name: PalServer-Manager v${{ needs.check-release-version.outputs.version }}
          body: |
            ## 🎉 Stable Release: v${{ needs.check-release-version.outputs.version }}

            This is the official stable release for PalServer-Manager.

            **Commit:** `${{ github.sha }}`
          makeLatest: true
          allowUpdates: false
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: dist/*-setup.exe

      - name: Publish Experimental Release
        if: github.ref == 'refs/heads/dev'
        uses: ncipollo/release-action@v1
        with:
          tag: experimental
          commit: ${{ github.sha }}
          name: PalServer-Manager (Experimental Build)
          body: |
            ## 🧪 Experimental Build

            This is an automatically generated build from the `dev` branch.
            Expect bugs and frequent updates!

            ### Recent Changes
            ${{ github.event.head_commit.message }}

            **Commit:** `${{ github.sha }}`
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: dist/*-setup.exe
